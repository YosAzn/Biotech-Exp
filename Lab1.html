<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המעבדה הוירטואלית בביוטכנולוגיה</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Metallic Background Setup */
        .metallic-bg {
          background: linear-gradient(135deg, #fdfbfb 0%, #e2e8f0 50%, #cbd5e1 100%);
          position: relative;
        }
        
        /* The metallic shine/brush effect overlay */
        .metallic-bg::after {
          content: "";
          position: fixed;
          top: -50%; left: -50%; width: 200%; height: 200%;
          background: linear-gradient(
            to right,
            rgba(255, 255, 255, 0) 0%,
            rgba(255, 255, 255, 0.5) 50%,
            rgba(255, 255, 255, 0) 100%
          );
          transform: rotate(35deg);
          pointer-events: none;
          z-index: 0;
        }

        /* Glassmorphism (Glassy) Cards */
        .glassy-card {
          background: rgba(255, 255, 255, 0.35);
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          border: 1px solid rgba(255, 255, 255, 0.9);
          border-right: 1px solid rgba(255, 255, 255, 0.4);
          border-bottom: 1px solid rgba(255, 255, 255, 0.4);
          box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        
        /* Glassy Shine Animation on Hover */
        .glassy-card::before {
          content: '';
          position: absolute;
          top: 0; left: -100%; width: 50%; height: 100%;
          background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
          transform: skewX(-25deg);
          transition: 0.7s ease-in-out;
        }
        .glassy-card:hover::before {
          left: 150%;
        }

        /* Glassy Header */
        .glassy-header {
          background: rgba(255, 255, 255, 0.65);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border-bottom: 1px solid rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons (SVG Inline to make it fully standalone) ---
        const Activity = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        const LineChart = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>;
        const Droplet = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>;
        const ArrowRight = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const CheckCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const Info = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const RefreshCw = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const Play = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const Microscope = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/></svg>;
        const Thermometer = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>;
        const ShieldAlert = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>;
        const Lightbulb = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>;
        const Eye = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;

        // --- Components ---

        // 1. Home Dashboard
        const Dashboard = ({ onSelectLab }) => {
          const labs = [
            {
              id: 'spectro',
              title: 'הכרת ספקטרופוטומטר',
              subtitle: 'קביעת אורך גל אופטימלי לתמיסת KMnO4',
              icon: <Activity className="w-8 h-8 text-purple-600" />,
              textColor: 'text-purple-900',
              glowColor: 'hover:shadow-[0_0_30px_rgba(168,85,247,0.3)] border-purple-100/50'
            },
            {
              id: 'biuret',
              title: 'מעבדת ביורט',
              subtitle: 'קביעת ריכוז חלבון באמצעות עקומת כיול',
              icon: <Droplet className="w-8 h-8 text-blue-600" />,
              textColor: 'text-blue-900',
              glowColor: 'hover:shadow-[0_0_30px_rgba(59,130,246,0.3)] border-blue-100/50'
            },
            {
              id: 'enzymes',
              title: 'קינטיקה אנזימטית (בטא עמילאז)',
              subtitle: 'השפעת ריכוז מצע וקביעת Vmax ו-Km',
              icon: <LineChart className="w-8 h-8 text-green-600" />,
              textColor: 'text-green-900',
              glowColor: 'hover:shadow-[0_0_30px_rgba(34,197,94,0.3)] border-green-100/50'
            },
            {
              id: 'pi',
              title: 'אפיון חלבונים - קביעת pI',
              subtitle: 'מציאת הנקודה האיזואלקטרית של קזאין',
              icon: <Microscope className="w-8 h-8 text-orange-600" />,
              textColor: 'text-orange-900',
              glowColor: 'hover:shadow-[0_0_30px_rgba(249,115,22,0.3)] border-orange-100/50'
            },
            {
              id: 'trypsin',
              title: 'מעבדת טריפסין',
              subtitle: 'השפעת רמת ה-pH על פעילות האנזים',
              icon: <Thermometer className="w-8 h-8 text-red-600" />,
              textColor: 'text-red-900',
              glowColor: 'hover:shadow-[0_0_30px_rgba(239,68,68,0.3)] border-red-100/50'
            },
            {
              id: 'mystery',
              title: 'תעלומת הנהר המזהם (יישום)',
              subtitle: 'חדר בריחה וירטואלי - יישום עקרונות המעבדה',
              icon: <ShieldAlert className="w-8 h-8 text-indigo-600" />,
              textColor: 'text-indigo-900',
              glowColor: 'hover:shadow-[0_0_30px_rgba(99,102,241,0.3)] border-indigo-100/50'
            }
          ];

          return (
            <div className="space-y-6 animate-fade-in relative z-10" dir="rtl">
              <div className="text-center mb-12">
                <h1 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-l from-slate-600 via-slate-800 to-slate-900 mb-4 drop-shadow-sm">
                  המעבדה הוירטואלית בביוטכנולוגיה
                </h1>
                <p className="text-lg text-slate-700 max-w-2xl mx-auto font-medium">
                  ברוכים הבאים לסביבת התרגול! כאן תוכלו לתרגל את עקרונות העבודה במעבדות הביוטכנולוגיה,
                  לנתח תוצאות וליישם את הידע באתגרים מיוחדים.
                </p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                {labs.map((lab) => (
                  <button
                    key={lab.id}
                    onClick={() => onSelectLab(lab.id)}
                    className={`flex flex-col items-center text-center p-8 rounded-3xl transition-all duration-500 hover:-translate-y-2 glassy-card group cursor-pointer relative overflow-hidden ${lab.glowColor}`}
                  >
                    <div className="p-5 rounded-2xl bg-white/60 shadow-inner mb-6 backdrop-blur-md border border-white/50 group-hover:scale-110 transition-transform duration-500">
                      {lab.icon}
                    </div>
                    <div className="relative z-10">
                      <h3 className={`text-2xl font-bold mb-3 ${lab.textColor} drop-shadow-sm`}>{lab.title}</h3>
                      <p className="text-slate-700 font-medium text-sm leading-relaxed">{lab.subtitle}</p>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          );
        };

        // 2. Spectrophotometer Lab (KMnO4)
        const SpectroLab = () => {
          const [wavelength, setWavelength] = useState(400);
          
          const getAbsorbance = (wl) => {
            const peak = 530;
            const spread = 40;
            const maxAbs = 1.2;
            const abs = maxAbs * Math.exp(-Math.pow(wl - peak, 2) / (2 * Math.pow(spread, 2)));
            return Math.max(0.01, abs).toFixed(3);
          };

          const getLightColor = (wl) => {
            if (wl >= 400 && wl < 450) return '#8b5cf6'; // Violet
            if (wl >= 450 && wl < 490) return '#3b82f6'; // Blue
            if (wl >= 490 && wl < 560) return '#22c55e'; // Green
            if (wl >= 560 && wl < 590) return '#eab308'; // Yellow
            if (wl >= 590 && wl < 630) return '#f97316'; // Orange
            if (wl >= 630 && wl <= 700) return '#ef4444'; // Red
            return '#ccc';
          };

          return (
            <div className="space-y-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100" dir="rtl">
              <div className="flex items-center gap-3 mb-4">
                <Activity className="text-purple-600 w-8 h-8" />
                <h2 className="text-2xl font-bold text-gray-800">מציאת אורך גל אופטימלי (KMnO4)</h2>
              </div>
              
              <div className="bg-purple-50 p-4 rounded-xl border border-purple-100 text-purple-900 mb-6 flex gap-3">
                <Info className="shrink-0 mt-1 w-5 h-5" />
                <p>
                  תמיסת אשלגן פרמנגנט (KMnO4) היא בעלת צבע סגול. מטרת הניסוי היא למצוא את "אורך הגל האופטימלי" - 
                  אורך הגל שבו הבליעה (Absorbance) היא המקסימלית.
                </p>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div className="space-y-6">
                  <div className="bg-gray-800 p-6 rounded-2xl text-white shadow-inner flex flex-col items-center">
                    <h3 className="text-xl mb-4 font-mono">ספקטרופוטומטר וירטואלי</h3>
                    <div className="text-5xl font-mono text-green-400 bg-black px-6 py-3 rounded-lg border border-gray-600 mb-6 relative">
                      {getAbsorbance(wavelength)} <span className="text-sm text-gray-400">O.D.</span>
                      {wavelength === 530 && (
                        <div className="absolute -top-3 -right-3 text-white bg-green-500 rounded-full p-1 animate-ping"></div>
                      )}
                    </div>
                    
                    <div className="w-full relative py-4">
                      <input 
                        type="range" 
                        min="400" max="700" step="10" 
                        value={wavelength}
                        onChange={(e) => setWavelength(Number(e.target.value))}
                        className="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer"
                      />
                      <div className="flex justify-between text-xs text-gray-400 mt-2 font-mono">
                        <span>400nm</span>
                        <span>700nm</span>
                      </div>
                    </div>
                    <div className="text-center mt-2">
                      <span className="text-gray-300">אורך גל נוכחי:</span> 
                      <span className="font-bold text-xl ml-2" style={{color: getLightColor(wavelength)}}>{wavelength} nm</span>
                    </div>
                  </div>
                </div>

                <div className="bg-gray-50 border border-gray-200 rounded-2xl p-6 relative">
                  <h3 className="text-lg font-bold text-gray-700 mb-4 text-center">ספקטרום בליעה</h3>
                  <div className="h-64 w-full relative flex items-end" dir="ltr">
                    {Array.from({length: 31}).map((_, i) => {
                      const wl = 400 + (i * 10);
                      const abs = getAbsorbance(wl);
                      const heightPct = (abs / 1.2) * 100;
                      const isActive = wl === wavelength;
                      return (
                        <div key={wl} className="flex-1 flex flex-col items-center group relative h-full justify-end">
                          <div 
                            className={`w-full mx-[1px] rounded-t-sm transition-all duration-300 ${isActive ? 'bg-purple-600' : 'bg-purple-200'}`}
                            style={{height: `${heightPct}%`}}
                          ></div>
                        </div>
                      );
                    })}
                  </div>
                  <div className="flex justify-between text-xs text-gray-500 mt-2" dir="ltr">
                    <span>400</span>
                    <span>אורך גל (nm)</span>
                    <span>700</span>
                  </div>
                  
                  {wavelength === 530 && (
                    <div className="absolute top-1/4 right-8 left-8 bg-green-100 border border-green-400 text-green-800 p-3 rounded-lg text-center font-bold animate-bounce shadow-lg">
                      <CheckCircle className="inline-block w-5 h-5 ml-2" />
                      מצוין! מצאת את אורך הגל האופטימלי (530nm)
                    </div>
                  )}
                </div>
              </div>

              {/* Device Theory Section */}
              <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 mt-6 overflow-hidden">
                <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                  <Eye className="w-5 h-5 text-slate-500" /> מבט לתוך הספקטרופוטומטר: איך זה עובד?
                </h3>
                
                <div className="flex flex-col md:flex-row items-center justify-between gap-2 relative">
                  
                  {/* 1. Light Source */}
                  <div className="flex flex-col items-center z-10 w-24">
                    <div className="bg-yellow-100 p-4 rounded-full border-2 border-yellow-300 shadow-[0_0_15px_rgba(253,224,71,0.6)] mb-2">
                      <Lightbulb className="w-8 h-8 text-yellow-500" />
                    </div>
                    <span className="text-xs font-bold text-center">מקור אור<br/>(אור לבן)</span>
                  </div>

                  {/* White beam */}
                  <div className="h-2 flex-1 bg-gradient-to-r from-yellow-200 to-white mx-[-10px] z-0"></div>

                  {/* 2. Prism/Monochromator */}
                  <div className="flex flex-col items-center z-10 w-24">
                    <div className="w-16 h-16 bg-slate-800 transform rotate-45 border-4 border-slate-600 mb-2 flex items-center justify-center">
                      <div className="w-full h-1 bg-gradient-to-r from-red-500 via-green-500 to-blue-500 transform -rotate-45"></div>
                    </div>
                    <span className="text-xs font-bold text-center">מונוכרומטור<br/>(מנסרה / סדק)</span>
                  </div>

                  {/* Filtered beam */}
                  <div 
                    className="h-4 flex-1 mx-[-10px] z-0 transition-colors duration-300" 
                    style={{ backgroundColor: getLightColor(wavelength), boxShadow: `0 0 10px ${getLightColor(wavelength)}` }}
                  ></div>

                  {/* 3. Cuvette */}
                  <div className="flex flex-col items-center z-10 w-24">
                    <div className="w-12 h-16 border-4 border-gray-300 rounded-b-lg bg-white relative overflow-hidden mb-2">
                      {/* Solution inside cuvette */}
                      <div className="absolute bottom-0 w-full h-3/4 bg-purple-600 opacity-70"></div>
                    </div>
                    <span className="text-xs font-bold text-center">קיווטה<br/>(תמיסת KMnO4)</span>
                  </div>

                  {/* Transmitted beam (Dimmer depending on absorbance) */}
                  <div 
                    className="h-4 flex-1 mx-[-10px] z-0 transition-all duration-300" 
                    style={{ 
                      backgroundColor: getLightColor(wavelength),
                      opacity: Math.max(0.1, 1 - (getAbsorbance(wavelength) / 1.5))
                    }}
                  ></div>

                  {/* 4. Detector */}
                  <div className="flex flex-col items-center z-10 w-24">
                    <div className="bg-blue-100 p-4 rounded-xl border-2 border-blue-400 mb-2">
                      <div className="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center">
                        <div className="w-4 h-4 rounded-full bg-blue-400 animate-pulse"></div>
                      </div>
                    </div>
                    <span className="text-xs font-bold text-center">גלאי (Detector)<br/>קולט אור שעבר</span>
                  </div>

                </div>
                
                <div className="mt-8 text-sm text-slate-600 bg-white p-4 rounded-lg border border-slate-200">
                  <strong>הסבר התהליך:</strong> מקור האור פולט אור לבן (כל צבעי הקשת). המונוכרומטור מפריד את האור ומאפשר רק לאורך גל מסוים (שבחרתם) לעבור. האור פוגע בקיווטה. חלק מהאור <strong>נבלע</strong> על ידי התמיסה, וחלק <strong>עובר</strong> הלאה. הגלאי מודד כמה אור הצליח לעבור, ומתרגם זאת לערך בליעה (O.D) שמוצג על הצג.
                </div>
              </div>
            </div>
          );
        };

        // 3. Biuret Lab (Proteins & Calibration Curve)
        const BiuretLab = () => {
          const [step, setStep] = useState(0);
          const [readings, setReadings] = useState([]);
          const [unknownCalc, setUnknownCalc] = useState('');

          const standards = [
            { id: 1, conc: 0, abs: 0.000 },
            { id: 2, conc: 2, abs: 0.125 },
            { id: 3, conc: 4, abs: 0.245 },
            { id: 4, conc: 6, abs: 0.360 },
            { id: 5, conc: 8, abs: 0.490 },
            { id: 6, conc: 10, abs: 0.610 }
          ];
          const unknown = { id: 7, conc: 'נעלם', abs: 0.415 };

          const runExperiment = () => {
            setStep(1);
            let currentReadings = [];
            standards.forEach((std, i) => {
              setTimeout(() => {
                currentReadings = [...currentReadings, std];
                setReadings([...currentReadings]);
              }, (i + 1) * 500);
            });
            setTimeout(() => {
              setReadings([...standards, unknown]);
              setStep(2);
            }, (standards.length + 1) * 500);
          };

          return (
            <div className="space-y-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100" dir="rtl">
              <div className="flex items-center gap-3 mb-4">
                <Droplet className="text-blue-600 w-8 h-8" />
                <h2 className="text-2xl font-bold text-gray-800">מעבדת ביורט - קביעת ריכוז חלבון</h2>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div>
                  <div className="flex justify-between items-center mb-4">
                    <h3 className="text-lg font-bold">מערך מבחנות (ביורט 540nm)</h3>
                    {step === 0 && (
                      <button 
                        onClick={runExperiment}
                        className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-colors"
                      >
                        <Play className="w-4 h-4 fill-current" /> קרא בליעה
                      </button>
                    )}
                  </div>
                  
                  <div className="flex gap-2 justify-center mb-8 border-b pb-8">

                  {step >= 1 && (

                <div className="bg-gray-50 rounded-2xl p-6 border border-gray-200">

                  {step === 2 ? (
                    <div className="space-y-4 animate-fade-in">
                        <div className="relative h-72 w-full bg-white p-8 pr-12 pb-12 rounded-xl border border-gray-300" dir="ltr">
                          <svg viewBox="-20 -10 120 120" className="w-full h-full overflow-visible">

                            <line x1="0" y1="100" x2="100" y2="100" stroke="#000" strokeWidth="0.5" />
                            <line x1="0" y1="0" x2="0" y2="100" stroke="#000" strokeWidth="0.5" />
                            
                            {/* Trend line */}

                            {/* Data points */}
                            {standards.map(std => {
                              const cx = (std.conc / 10) * 100;
                              const cy = 100 - ((std.abs / 0.7) * 100);
                              return (
                                <circle key={std.id} cx={cx} cy={cy} r="2" fill="#2563eb" />

                            {/* Unknown */}
                            <circle cx={(6.8)} cy={100 - ((0.415 / 0.7) * 100)} r="3" fill="#ef4444" className="animate-ping" style={{animationDuration: '2s'}}/>
                            <circle cx={(6.8)} cy={100 - ((0.415 / 0.7) * 100)} r="3" fill="#ef4444" />
                            
                            {/* Labels */}
                            <text x="50" y="115" textAnchor="middle" fontSize="6" fill="#444" fontWeight="bold">ריכוז חלבון (mg/ml)</text>

                        <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm mt-6 text-center">

                          <div className="flex items-center justify-center gap-3">

        };

        // 4. Enzyme Kinetics Lab
        const EnzymeLab = () => {
          const [substrate, setSubstrate] = useState(0); 
          const [points, setPoints] = useState([]);
          
          const [estVmax, setEstVmax] = useState(60); 
          const [estKm, setEstKm] = useState(null); 
          
          const trueVmax = 40;
          const trueKm = 5;

          const measureRate = () => {
            if (points.find(p => p.s === substrate)) return; 
            const rate = (trueVmax * substrate) / (trueKm + substrate);
            setPoints([...points, { s: substrate, v: rate }].sort((a,b) => a.s - b.s));
          };

          const handleGraphPointer = (e) => {
            if (e.type === 'pointermove' && e.buttons !== 1 && e.pointerType === 'mouse') return; 
            
            const rect = e.currentTarget.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let s = (x / rect.width) * 40; 
            s = Math.max(0, Math.min(40, s));
            
            const isVmaxCorrect = Math.abs(estVmax - trueVmax) <= 2;
            if (isVmaxCorrect && Math.abs(s - trueKm) <= 1.5) {
              s = trueKm; 
            }

            setEstKm(s);
          };

          const isKmCorrect = estKm !== null && Math.abs(estKm - trueKm) <= 0.8;
          const isVmaxCorrect = Math.abs(estVmax - trueVmax) <= 2;
          const isAllCorrect = isKmCorrect && isVmaxCorrect;

          return (
            <div className="space-y-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100" dir="rtl">

                      type="range" min="10" max="60" step="1"
                      value={estVmax}
                      onChange={(e) => setEstVmax(Number(e.target.value))}
                      className="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer mb-2"
                    />
                    <div className="text-left font-mono text-blue-700 font-bold mb-6">Vmax = {estVmax}</div>

                    <label className="block text-sm mb-2 text-purple-800">

                      {isAllCorrect ? (
                        <span className="flex items-center gap-2 animate-pulse"><CheckCircle className="w-5 h-5"/> מצאת את הקבועים בהצלחה! Vmax=40, Km=5</span>
                      ) : (
                        "ממתין למציאת הערכים המדויקים על הגרף..."
                      )}
                    </div>
                  </div>
                </div>

                <div className="bg-white border-2 border-gray-200 rounded-2xl p-6 relative shadow-inner">
                  <h3 className="text-lg font-bold text-gray-700 mb-6 text-center">עקומת מיכאליס-מנטן</h3>
                  
                  <div className="relative pl-12 pb-10" dir="ltr">
                    {/* Y-axis label */}
                    <div className="absolute -left-6 top-1/2 -translate-y-1/2 -rotate-90 text-sm font-bold text-gray-700 whitespace-nowrap">
                      מהירות (V0)
                    </div>

                    {/* Y-axis ticks */}
                    <div className="absolute left-4 top-0 h-64 flex flex-col justify-between items-end text-xs font-mono text-gray-500">
                      <span className="-mt-2">60 -</span>
                      <span>45 -</span>
                      <span>30 -</span>
                      <span>15 -</span>
                      <span className="-mb-2">0 -</span>
                    </div>

                    {/* Main Graph Area */}
                    <div 
                      className="ml-4 relative h-64 border-l-2 border-b-2 border-gray-600 bg-gray-50 touch-none cursor-crosshair overflow-hidden" 
                      onPointerDown={handleGraphPointer}
                      onPointerMove={handleGraphPointer}
                    >
                        {/* User Vmax Line (Red) */}
                        <div 
                          className="absolute w-full border-t-2 border-red-500 pointer-events-none transition-all" 
                          style={{top: `${100 - (estVmax/60)*100}%`}}
                        >
                          <span className="absolute -top-6 right-2 text-red-600 text-xs font-bold bg-white px-1 border border-red-200 rounded shadow-sm">
                            Vmax (ציר Y)
                          </span>
                        </div>
                        
                        {/* Half Vmax Line (Blue) */}
                        <div 
                          className="absolute w-full border-t-2 border-dashed border-blue-500 pointer-events-none transition-all" 
                          style={{top: `${100 - ((estVmax/2)/60)*100}%`}}
                        >
                          <span className="absolute -top-6 right-2 text-blue-600 text-xs font-bold bg-white px-1 border border-blue-200 rounded shadow-sm">
                            ½ Vmax ({estVmax/2})
                          </span>
                        </div>

                        {/* Interactive Km Line (Purple) */}
                        {estKm !== null && (
                          <div 
                            className={`absolute h-full transition-all pointer-events-none ${isKmCorrect && isVmaxCorrect ? 'border-l-4 border-solid border-green-500 bg-green-500/20' : 'border-l-2 border-dashed border-purple-500 bg-purple-500/10'}`}
                            style={{left: `${(estKm/40)*100}%`, marginLeft: isKmCorrect && isVmaxCorrect ? '-2px' : '-1px'}}
                          >
                            <span className={`absolute bottom-2 left-3 px-2 py-1 rounded text-xs font-bold transition-all whitespace-nowrap ${isKmCorrect && isVmaxCorrect ? 'bg-green-600 text-white scale-110 shadow-[0_0_10px_rgba(34,197,94,0.5)]' : 'bg-purple-100 text-purple-800'}`}>
                              {isKmCorrect && isVmaxCorrect ? '🔒 ' : ''}Km (ציר X) = {estKm.toFixed(1)}
                            </span>
                          </div>
                        )}

                        {/* Data points */}
                        {points.map((p, i) => {
                          const cx = (p.s / 40) * 100; 
                          const cy = 100 - ((p.v / 60) * 100); 
                          return (
                            <div 
                              key={i} 
                              className="absolute w-4 h-4 bg-green-600 rounded-full -ml-2 -mt-2 shadow-md hover:scale-125 transition-transform pointer-events-none"
                              style={{left: `${cx}%`, top: `${cy}%`}}
                            ></div>
                          );

                    </div>

                    {/* X-axis ticks */}
                    <div className="ml-4 mt-2 flex justify-between text-xs font-mono text-gray-500 relative">
                        <span className="-ml-1">0</span>
                        <span>10</span>
                        <span>20</span>
                        <span>30</span>
                        <span className="-mr-2">40</span>
                    </div>
                    
                    {/* X-axis label */}
                    <div className="ml-4 mt-4 text-center text-sm font-bold text-gray-700">
                      ריכוז המצע [S] (mM)
                    </div>
                  </div>
                  
                  {isAllCorrect && (
                    <div className="mt-6 p-4 rounded-xl border bg-green-50 border-green-200 animate-fade-in">
                        <h4 className="text-green-800 font-bold mb-2">סיכום התוצאות:</h4>
                        <p className="text-sm text-green-900 leading-relaxed">
                          <strong>Vmax (~40):</strong> מהירות התגובה המקסימלית האפשרית. בשלב זה כל האתרים הפעילים של האנזים תפוסים על ידי המצע (רוויה).<br/>
                          <strong>Km (~5):</strong> ריכוז המצע שבו המהירות היא בדיוק חצי מה-Vmax. ערך זה מעיד על הזיקה (Affinity) של האנזים למצע. (Km נמוך = זיקה גבוהה).
                        </p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        // 5. pI Lab
        const PiLab = () => {
          const tubes = [
            { ph: 3.0, expectedOD: 0.35, precipitateLevel: 1 },
            { ph: 4.0, expectedOD: 0.15, precipitateLevel: 2 },
            { ph: 4.6, expectedOD: 0.05, precipitateLevel: 4 }, // pI
            { ph: 5.0, expectedOD: 0.18, precipitateLevel: 2 },
            { ph: 6.0, expectedOD: 0.40, precipitateLevel: 1 },
          ];
          
          const [stage, setStage] = useState(0);

          return (
            <div className="space-y-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100" dir="rtl">
              <div className="flex items-center gap-3 mb-4">
                <Microscope className="text-orange-600 w-8 h-8" />
                <h2 className="text-2xl font-bold text-gray-800">אפיון חלבונים - קביעת ה-pI של קזאין</h2>
              </div>

              <div className="bg-orange-50 p-4 rounded-xl border border-orange-100 text-orange-900 mb-6">
                <p>
                  כאשר ה-pH של התמיסה שווה לנקודה האיזואלקטרית (pI) של החלבון, המטען החשמלי הכולל שלו הוא אפס. 
                  במצב זה, מולקולות החלבון נקשרות זו לזו, יוצרות תלכידים ו<strong>שוקעות</strong>. 
                  נבדוק באילו מבחנות כמות החלבון בנוזל העליון (סופרנטנט) היא ה<strong>מינימלית</strong>, מה שיעיד שרוב החלבון שקע.
                </p>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div>
                  <div className="flex justify-center gap-4 mb-8 mt-4 h-48 items-end border-b-2 pb-2">
                    {tubes.map((tube, idx) => (
                      <div key={idx} className="flex flex-col items-center">
                          <div className="w-12 h-32 border-2 border-gray-400 rounded-b-2xl relative bg-blue-50 overflow-hidden">
                            <div className={`absolute bottom-0 w-full h-full bg-white transition-all duration-1000 ${stage >= 1 ? 'opacity-50' : 'opacity-10'}`}></div>
                            
                            {stage >= 1 && (
                              <div className="absolute bottom-0 w-full bg-orange-100 border-t border-orange-200 transition-all duration-1000 flex flex-wrap content-end justify-center pb-1"
                                  style={{height: `${tube.precipitateLevel * 15}%`}}>
                                {Array.from({length: tube.precipitateLevel * 3}).map((_, i) => (
                                  <div key={i} className="w-2 h-2 bg-orange-400 rounded-full m-[1px]"></div>
                                ))}
                              </div>
                            )}
                          </div>
                          <div className="mt-2 font-bold bg-gray-200 px-2 rounded">pH {tube.ph}</div>
                      </div>
                    ))}
                  </div>
                  
                  <div className="flex gap-4 justify-center">
                    {stage === 0 && (
                      <button onClick={() => setStage(1)} className="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded-lg font-bold">
                        הוסף קזאין והמתן לשקיעה
                      </button>
                    )}
                    {stage === 1 && (
                      <button onClick={() => setStage(2)} className="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">
                        דגום נוזל עליון ובדוק בביורט
                      </button>
                    )}
                  </div>

                  {stage === 2 && (
                    <div className="mt-10 bg-white p-6 rounded-2xl border border-gray-300 shadow-md animate-fade-in">
                      <h4 className="text-xl font-bold text-center mb-6 text-gray-700">גרף שקיעת החלבון</h4>
                      <div className="relative h-72 w-full pr-4" dir="ltr">
                        <svg viewBox="-5 -5 110 120" className="w-full h-full overflow-visible">
                          <line x1="0" y1="100" x2="100" y2="100" stroke="#94a3b8" strokeWidth="1" />
                          <line x1="0" y1="0" x2="0" y2="100" stroke="#94a3b8" strokeWidth="1" />
                          <polyline 
                            fill="none" stroke="#f97316" strokeWidth="2.5"
                            points={tubes.map(t => {
                              const x = ((t.ph - 2) / 5) * 100;
                              const y = 100 - ((t.expectedOD / 0.5) * 100);
                              return `${x},${y}`;
                            }).join(' ')}
                          />
                          {tubes.map(t => {
                              const x = ((t.ph - 2) / 5) * 100;
                              const y = 100 - ((t.expectedOD / 0.5) * 100);
                              return (
                                <g key={t.ph}>
                                  <circle cx={x} cy={y} r="3.5" fill="#ea580c" />
                                  <text x={x} y={y - 6} fontSize="5" textAnchor="middle" fill="#475569" fontWeight="bold">{t.expectedOD}</text>
                                  <text x={x} y="110" fontSize="6" textAnchor="middle" fill="#475569" fontWeight="bold">{t.ph}</text>
                                </g>
                              );
                          })}
                          <line x1="52" y1="90" x2="52" y2="100" stroke="#22c55e" strokeWidth="1.5" strokeDasharray="3" />
                          <text x="52" y="80" fontSize="6" textAnchor="middle" fill="#166534" fontWeight="bold">מינימום = pI</text>
                        </svg>
                      </div>
                    </div>
                  )}
                </div>

                <div className="bg-gray-50 rounded-2xl p-6 border border-gray-200">
                  <h3 className="text-lg font-bold text-gray-700 mb-4 text-center">תוצאות קריאת ספקטרופוטומטר</h3>
                  {stage === 2 ? (
                    <div className="animate-fade-in space-y-8">
                      <table className="w-full text-center border-collapse bg-white shadow-sm">
                        <thead>
                          <tr className="bg-gray-200 text-sm">
                            <th className="border p-3">pH</th>
                            <th className="border p-3">בליעה ב-540nm<br/><span className="text-xs font-normal">(ריכוז חלבון בנוזל העליון)</span></th>
                          </tr>
                        </thead>
                        <tbody>
                          {tubes.map(t => (
                            <tr key={t.ph} className={t.ph === 4.6 ? 'bg-green-100 font-bold' : ''}>
                              <td className="border p-3">{t.ph}</td>
                              <td className="border p-3">{t.expectedOD}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                      
                      <div className="bg-white p-6 rounded-xl border border-orange-200 text-sm shadow-sm">

                        <p className="text-orange-700 font-black text-2xl text-center mt-2 bg-orange-50 p-4 rounded-xl border border-orange-100">
                          ה-pI של קזאין הוא 4.6
                        </p>
                      </div>
                    </div>
                  ) : (
                    <div className="h-full flex items-center justify-center text-gray-400">השלם את הניסוי להצגת נתונים</div>
                  )}

              </div>
            </div>
          );
        };

        // 6. Trypsin Lab
        const TrypsinLab = () => {
          const [phSelected, setPhSelected] = useState(7);
          const [results, setResults] = useState([]);
          
          const getTrypsinActivity = (ph) => {
            const opt = 8;
            const diff = Math.abs(ph - opt);
            if (diff === 0) return 0.85; 
            if (diff === 1) return 0.55;
            if (diff === 2) return 0.15;
            return 0.02;
          };

          const runTest = () => {
            if (results.find(r => r.ph === phSelected)) return;
            const act = getTrypsinActivity(phSelected);
            setResults([...results, { ph: phSelected, act }].sort((a,b) => a.ph - b.ph));
          };

          return (
            <div className="space-y-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100" dir="rtl">
              <div className="flex items-center gap-3 mb-4">
                <Thermometer className="text-red-600 w-8 h-8" />
                <h2 className="text-2xl font-bold text-gray-800">מעבדת טריפסין - השפעת pH על פעילות אנזים</h2>
              </div>

              <div className="bg-red-50 p-4 rounded-xl border border-red-100 text-red-900 mb-6">
                <p>
                  האנזים טריפסין מפרק חלבונים פועל במערכת העיכול (במעי הדק). 
                  בניסוי נשתמש במצע סינתטי (BAPNA) שכאשר האנזים מפרק אותו, משתחרר חומר בעל צבע צהוב.
                  קצב הופעת הצבע (בליעה ב-410nm) מעיד על מידת פעילות האנזים.
                </p>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div className="bg-gray-50 p-6 rounded-2xl">
                  <label className="block font-bold text-gray-700 mb-4">
                    בחר רמת pH למבחנה הבאה: <span className="text-2xl text-red-600 mx-2">{phSelected}</span>
                  </label>
                  <input 
                    type="range" min="5" max="11" step="1"
                    value={phSelected}
                    onChange={(e) => setPhSelected(Number(e.target.value))}
                    className="w-full h-2 bg-red-200 rounded-lg appearance-none cursor-pointer mb-6"
                  />
                  <button onClick={runTest} className="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl mb-6">
                    הוסף אנזים ומדוד פעילות
                  </button>

                  <div className="flex gap-2 justify-center h-24 items-end">
                    {results.map(r => (
                      <div key={r.ph} className="flex flex-col items-center">
                        <div className="w-10 h-16 border-2 border-gray-400 rounded-b-xl bg-white relative overflow-hidden">
                          <div className="absolute bottom-0 w-full transition-all" style={{height: '100%', backgroundColor: `rgba(234, 179, 8, ${r.act})`}}></div>
                        </div>
                        <div className="text-xs font-bold mt-1">pH {r.ph}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-white border-2 border-gray-200 rounded-2xl p-6">
                  <h3 className="font-bold text-center mb-4">גרף פעילות אנזימטית (פעמון)</h3>
                  <div className="relative h-48 w-full border-l-2 border-b-2 border-gray-600" dir="ltr">
                    {results.map((r, i) => {
                        const cx = ((r.ph - 5) / 6) * 100; 
                        const cy = 100 - (r.act / 1.0 * 100);
                        return (
                          <div 
                            key={i} 
                            className="absolute w-4 h-4 bg-red-500 rounded-full -ml-2 -mt-2 shadow"
                            style={{left: `${cx}%`, top: `${cy}%`}}
                          ></div>
                        );
                      })}
                  </div>
                  <div className="flex justify-between text-xs text-gray-500 mt-2" dir="ltr">
                    <span>5</span><span className="font-bold">רמת pH</span><span>11</span>
                  </div>
                  
                  {results.length >= 4 && (
                    <div className="mt-4 p-3 bg-red-50 text-red-800 rounded-lg text-sm font-bold text-center border border-red-200 animate-fade-in">
                      מסקנה: ה-pH האופטימלי של טריפסין הוא בסיסי (סביב 8). זה תואם את סביבת הפעילות הטבעית שלו במעי הדק, בניגוד לפפסין למשל שפועל בקיבה החומצית!
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        // 7. Mystery / Application Lab
        const MysteryLab = () => {
          const [step, setStep] = useState(1);
          const [answers, setAnswers] = useState({
            q1: '', q2: '', q3: '', q4: '', q5: '', q6: '', q7: ''
          });

          const handleInput = (q, val) => setAnswers(prev => ({...prev, [q]: val}));

          return (
            <div className="space-y-6 bg-slate-900 text-white p-8 rounded-2xl shadow-xl border border-indigo-500" dir="rtl">
              <div className="flex items-center gap-3 mb-6 border-b border-slate-700 pb-4">
                <ShieldAlert className="text-indigo-400 w-10 h-10 animate-pulse" />
                <h2 className="text-3xl font-bold text-indigo-300">אתגר יישומי: להציל את נהר הירקון</h2>
              </div>

              <div className="bg-slate-800 p-6 rounded-xl border border-slate-600 text-lg leading-relaxed shadow-inner">
                <p>
                  <strong>מצב חירום!</strong> מפעל ביוטכנולוגי נטוש דלף רעלן חלבוני למי הנהר. 
                  אתם צוות החירום. עליכם להשתמש בידע מהמעבדות כדי לאפיין את הרעלן ולנטרל אותו בעזרת אנזים מיוחד. 
                </p>
              </div>

              {step >= 1 && (
                <div className={`p-6 rounded-xl border-l-4 ${step > 1 ? 'bg-slate-800/50 border-slate-600 text-slate-400' : 'bg-slate-800 border-blue-500 animate-fade-in'}`}>
                  <h3 className="text-xl font-bold text-blue-400 mb-2">1. הערכת הנזק (בדיקת ביורט)</h3>
                  <p className="mb-4">משוואת כיול לזיהוי ריכוז הרעלן (y=בליעה, x=ריכוז): <strong>y = 0.05x</strong>.<br/>הבליעה בספקטרופוטומטר: <strong>0.45 O.D</strong>.</p>
                  <div className="flex items-center gap-4">
                    <label>ריכוז (x) ב- mg/ml?</label>
                    <input type="number" value={answers.q1} onChange={e => handleInput('q1', e.target.value)} disabled={step > 1} className="bg-slate-700 border border-slate-500 rounded px-3 py-1 w-24 text-center text-white" />
                    {answers.q1 === '9' && step === 1 && <button onClick={() => setStep(2)} className="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded font-bold">המשך</button>}
                  </div>
                </div>
              )}

              {step >= 2 && (
                <div className={`p-6 rounded-xl border-l-4 ${step > 2 ? 'bg-slate-800/50 border-slate-600 text-slate-400' : 'bg-slate-800 border-purple-500 animate-fade-in mt-4'}`}>
                  <h3 className="text-xl font-bold text-purple-400 mb-2">2. ספקטרופוטומטריה</h3>
                  <p className="mb-4">הבליעה המקסימלית של הרעלן מתרחשת באורך גל 540nm.</p>
                  <div className="flex items-center gap-4">
                    <label>איך נקרא אורך הגל הזה?</label>
                    <select value={answers.q2} onChange={e => handleInput('q2', e.target.value)} disabled={step > 2} className="bg-slate-700 border border-slate-500 rounded px-3 py-2 text-white">
                      <option value="">בחר...</option><option value="min">מינמלי</option><option value="opt">אופטימלי</option><option value="iso">איזואלקטרי</option>
                    </select>
                    {answers.q2 === 'opt' && step === 2 && <button onClick={() => setStep(3)} className="bg-purple-600 px-4 py-1 rounded font-bold">המשך</button>}
                  </div>
                </div>
              )}

              {step >= 3 && (
                <div className={`p-6 rounded-xl border-l-4 ${step > 3 ? 'bg-slate-800/50 border-slate-600 text-slate-400' : 'bg-slate-800 border-orange-500 animate-fade-in mt-4'}`}>
                  <h3 className="text-xl font-bold text-orange-400 mb-2">3. אפיון חלבונים (pI)</h3>
                  <p className="mb-4">הנקודה האיזואלקטרית (pI) של הרעלן היא <strong>5.0</strong>. ה-pH של הנהר כרגע הוא בדיוק <strong>5.0</strong>.</p>
                  <div className="flex items-center gap-4">
                    <label>מה מצבו של הרעלן בנהר?</label>
                    <select value={answers.q3} onChange={e => handleInput('q3', e.target.value)} disabled={step > 3} className="bg-slate-700 border border-slate-500 rounded px-3 py-2 text-white">
                      <option value="">בחר...</option><option value="precipitate">שוקע כמשקע</option><option value="dissolve">מומס במים</option>
                    </select>
                    {answers.q3 === 'precipitate' && step === 3 && <button onClick={() => setStep(4)} className="bg-orange-600 px-4 py-1 rounded font-bold">המשך</button>}
                  </div>
                </div>
              )}

              {step >= 4 && (
                <div className={`p-6 rounded-xl border-l-4 ${step > 4 ? 'bg-slate-800/50 border-slate-600 text-slate-400' : 'bg-slate-800 border-red-500 animate-fade-in mt-4'}`}>
                  <h3 className="text-xl font-bold text-red-400 mb-2">4. סביבת הפעילות של האנזים</h3>
                  <p className="mb-4">אנזים הפירוק שלכם פעיל ב-pH אופטימלי 8. הנהר כרגע ב-pH 5.</p>
                  <div className="flex items-center gap-4">
                    <label>מה קורה למבנה האנזים ב-pH 5?</label>
                    <select value={answers.q4} onChange={e => handleInput('q4', e.target.value)} disabled={step > 4} className="bg-slate-700 border border-slate-500 rounded px-3 py-2 text-white">
                      <option value="">בחר...</option><option value="renaturation">רנטורציה</option><option value="denaturation">דנטורציה</option>
                    </select>
                    {answers.q4 === 'denaturation' && step === 4 && <button onClick={() => setStep(5)} className="bg-red-600 px-4 py-1 rounded font-bold">המשך</button>}
                  </div>
                </div>
              )}

              {step >= 5 && (
                <div className={`p-6 rounded-xl border-l-4 ${step > 5 ? 'bg-slate-800/50 border-slate-600 text-slate-400' : 'bg-slate-800 border-green-500 animate-fade-in mt-4'}`}>
                  <h3 className="text-xl font-bold text-green-400 mb-2">5. חישוב קינטיקה</h3>
                  <p className="mb-4">בריכוז מצע (רעלן) אינסופי בנהר, קצב הפירוק נשאר קבוע על <strong>120 יחידות לדקה</strong>.</p>
                  <div className="flex items-center gap-4">
                    <label>איזה מושג קינטימטי מייצג הערך 120?</label>
                    <select value={answers.q5} onChange={e => handleInput('q5', e.target.value)} disabled={step > 5} className="bg-slate-700 border border-slate-500 rounded px-3 py-2 text-white">
                      <option value="">בחר...</option><option value="km">Km</option><option value="vmax">Vmax</option>
                    </select>
                    {answers.q5 === 'vmax' && step === 5 && <button onClick={() => setStep(6)} className="bg-green-600 px-4 py-1 rounded font-bold">המשך</button>}
                  </div>
                </div>
              )}

              {step >= 6 && (
                <div className={`p-6 rounded-xl border-l-4 ${step > 6 ? 'bg-slate-800/50 border-slate-600 text-slate-400' : 'bg-slate-800 border-teal-500 animate-fade-in mt-4'}`}>
                  <h3 className="text-xl font-bold text-teal-400 mb-2">6. סיבוך מעכבים</h3>
                  <p className="mb-4">חומר אחר בנהר דומה במבנה לרעלן וחוסם את האתר הפעיל, אך עודף רעלן יכול לדחוק אותו החוצה.</p>
                  <div className="flex items-center gap-4">
                    <label>איזה סוג של מעכב זה?</label>
                    <select value={answers.q6} onChange={e => handleInput('q6', e.target.value)} disabled={step > 6} className="bg-slate-700 border border-slate-500 rounded px-3 py-2 text-white">
                      <option value="">בחר...</option><option value="noncomp">לא תחרותי</option><option value="comp">תחרותי</option>
                    </select>
                    {answers.q6 === 'comp' && step === 6 && <button onClick={() => setStep(7)} className="bg-teal-600 px-4 py-1 rounded font-bold">המשך</button>}
                  </div>
                </div>
              )}

              {step >= 7 && (
                <div className={`p-6 rounded-xl border-l-4 ${step > 7 ? 'bg-slate-800/50 border-slate-600 text-slate-400' : 'bg-slate-800 border-cyan-500 animate-fade-in mt-4'}`}>
                  <h3 className="text-xl font-bold text-cyan-400 mb-2">7. השפעת המעכב</h3>
                  <p className="mb-4">בגלל המעכב התחרותי, הזיקה של האנזים למצע ירדה.</p>
                  <div className="flex items-center gap-4">
                    <label>מה קרה לערך ה-Km?</label>
                    <select value={answers.q7} onChange={e => handleInput('q7', e.target.value)} disabled={step > 7} className="bg-slate-700 border border-slate-500 rounded px-3 py-2 text-white">
                      <option value="">בחר...</option><option value="increase">ה-Km גדל</option><option value="decrease">ה-Km קטן</option>
                    </select>
                    {answers.q7 === 'increase' && step === 7 && <button onClick={() => setStep(8)} className="bg-cyan-600 px-4 py-1 rounded font-bold">טהר את הנהר!</button>}
                  </div>
                </div>
              )}

              {step === 8 && (
                <div className="bg-indigo-800 p-8 rounded-xl border-2 border-indigo-300 text-center animate-fade-in mt-8 shadow-[0_0_30px_rgba(99,102,241,0.5)]">
                  <div className="text-7xl mb-4 animate-bounce">🌍💧✨</div>
                  <h2 className="text-4xl font-black text-white mb-4">הצלתם את הנהר!</h2>
                  <p className="text-xl text-indigo-100">
                    הפגנתם ידע מושלם בכל השלבים והוכחתם שאתם מוכנים לבגרות במעבדה!
                  </p>
                </div>
              )}
            </div>
          );
        };

        // Main App Container
        const App = () => {
          const [activeLab, setActiveLab] = useState(null);

          const renderActiveLab = () => {
            switch(activeLab) {
              case 'spectro': return <SpectroLab />;
              case 'biuret': return <BiuretLab />;
              case 'enzymes': return <EnzymeLab />;
              case 'pi': return <PiLab />;
              case 'trypsin': return <TrypsinLab />;
              case 'mystery': return <MysteryLab />;
              default: return <Dashboard onSelectLab={setActiveLab} />;
            }
          };

          return (
            <div className="min-h-screen font-sans pb-12 metallic-bg relative overflow-x-hidden" dir="rtl">
              <header className="glassy-header shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setActiveLab(null)}>
                  <div className="bg-gradient-to-br from-blue-500 to-indigo-600 text-white p-2.5 rounded-xl shadow-md group-hover:shadow-lg group-hover:scale-105 transition-all">
                    <Activity className="w-6 h-6" />
                  </div>
                  <span className="text-2xl font-black text-slate-800 tracking-tight drop-shadow-sm">BioTech<span className="text-blue-600">Lab</span></span>
                </div>
                
                {activeLab && (
                  <button 
                    onClick={() => setActiveLab(null)}
                    className="text-slate-700 hover:text-slate-900 flex items-center gap-2 bg-white/50 hover:bg-white/80 px-5 py-2.5 rounded-full transition-all font-bold text-sm border border-white/60 shadow-sm hover:shadow-md"
                  >
                    חזרה ללוח הראשי <ArrowRight className="w-4 h-4" />
                  </button>
                )}
              </header>

              <main className="max-w-6xl mx-auto px-4 py-8 relative z-10">
                {renderActiveLab()}
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
