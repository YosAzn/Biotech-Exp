<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאגר שאלות מעבדה בביוטכנולוגיה</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js & Annotation Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/2.2.1/chartjs-plugin-annotation.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Rubik', sans-serif;
        }
        .fade-in-down {
            animation: fadeInDown 0.4s ease-out forwards;
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-slate-100 text-right min-h-screen">

    <div class="p-4 md:p-8 font-sans max-w-4xl mx-auto">
        <!-- Header -->
        <header class="bg-white rounded-xl shadow-sm p-6 mb-8 border-t-4 border-blue-600">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">מאגר שאלות מעבדה בביוטכנולוגיה</h1>
            <p class="text-gray-600">רמת אתגר - ניתוח נתונים, גרפים וחשיבה כמותית.</p>
        </header>

        <!-- Questions Container -->
        <div id="questions-container" class="space-y-6">
            <!-- Questions will be injected here via JavaScript -->
        </div>

        <div class="mt-8 text-center text-gray-500 text-sm">
            <p>המערכת פותחה על בסיס מאגר שאלות מעבדה בביוטכנולוגיה. קובץ HTML מלא ועצמאי.</p>
        </div>
    </div>

    <script>
        // Icons SVGs
        const icons = {
            beaker: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-blue-600"><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>`,
            info: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-blue-600"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`,
            chart: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-indigo-600"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>`,
            chevronDown: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`,
            chevronUp: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>`
        };

        // Data
        const questions = [
            {
                id: 'q1',
                unit: 'יחידה 1: פעילות עמילאז בצמחי בר שונים',
                context: 'חוקרים השוו את פעילות האנזים מפרק העמילן במיצויים משני צמחי בר: צמח א׳ וצמח ב׳. כל מיצוי הודגר עם תמיסת עמילן במשך 6 דקות ב־37°C. לאחר מכן הוסף ריאגנט צבעוני המגיב עם סוכרים מחזרים, והבליעה נמדדה בספקטרופוטומטר.',
                question: '1. מהם המשתנה הבלתי תלוי והמשתנה התלוי בניסוי זה? כיצד נמדד המשתנה התלוי?',
                answer: 'המשתנה הבלתי תלוי הוא סוג הצמח (צמח א׳ או צמח ב׳). <br/>המשתנה התלוי הוא פעילות האנזים עמילאז. משתנה זה נמדד בדרך עקיפה על ידי מדידת כמות התוצר (סוכרים מחזרים כמו מלטוז) באמצעות תגובת צבע ומדידת ערך הבליעה בספקטרופוטומטר.',
                icon: icons.beaker
            },
            {
                id: 'q2',
                unit: 'יחידה 1: פעילות עמילאז בצמחי בר שונים',
                context: 'כדי לוודא שתוצאות הניסוי אמינות, החוקרים נדרשו להכין מבחנות בקרה מתאימות.',
                question: '2. הצע שתי בקרות הכרחיות למערכת ניסוי זו והסבר את החשיבות של כל אחת מהן.',
                answer: 'בקרה 1: מבחנה המכילה תמיסת עמילן ומים (ללא מיצוי צמח כלל). מטרתה לוודא שהעמילן אינו מתפרק מעצמו בתנאי ההדגרה ללא נוכחות האנזים.<br/>בקרה 2: מבחנה המכילה עמילן ומיצוי צמח שהורתח מראש. מטרתה להוכיח שהפירוק של העמילן נעשה על ידי תהליך אנזימטי-ביולוגי (הרתחה גורמת לדנטורציה של האנזים).',
                icon: icons.info
            },
            {
                id: 'q3',
                unit: 'יחידה 2: קינטיקה אנזימטית - השפעת ריכוז המצע',
                context: 'בסדרת ניסויים נוספת, נבדק קצב יצירת התוצר (µM/min) בריכוזי מצע (mM) שונים. התקבלו התוצאות הבאות:<br/>0.25 mM: 12.5 µM/min<br/>0.50 mM: 21.6 µM/min<br/>1.00 mM: 33.7 µM/min<br/>2.00 mM: 41.0 µM/min<br/>4.00 mM: 42.7 µM/min',
                question: '3. תאר את הקשר בין ריכוז המצע לקצב התגובה על פי הנתונים. האם הקשר ליניארי לאורך כל התחום?',
                answer: 'ככל שריכוז המצע עולה, קצב התגובה עולה, אך העלייה הולכת וקטנה. כלומר, הקשר אינו ליניארי בכל התחום אלא מתקרב לרוויה. רוויה נראית בעיקר בין 2.00 ל־4.00 mM, שם העלייה בקצב קטנה מאוד למרות הכפלת ריכוז המצע.',
                icon: icons.chart
            },
            {
                id: 'q4',
                unit: 'יחידה 2: קינטיקה אנזימטית - השפעת ריכוז המצע',
                context: 'על סמך הנתונים הכמותיים הקודמים יש לנתח את מאפייני האנזים.',
                question: '4. הערך את ערכי ה-Vmax וה-Km של האנזים. האם התוצאות מעידות על עיכוב על ידי מצע בריכוזים הגבוהים? נמק והיעזר בגרף המצורף.',
                answer: 'Vmax משוער הוא כ־43 µM/min, לפי הקצב הגבוה ביותר שנמדד וההתקרבות לפלטו (שלב הרוויה).<br/>מחצית Vmax היא בערך 21.5 µM/min. הקצב הקרוב לכך מתקבל סביב 0.5 mM מצע, ולכן Km מוערך בכ־0.5 mM. זוהי הערכה מתוך התבוננות בנתונים.<br/>לא רואים ירידה בקצב ב־4.00 mM ביחס ל־2.00 mM, אלא עלייה קטנה מאוד. לכן הנתונים מעידים על רוויה רגילה, ולא על עיכוב על ידי מצע.',
                icon: icons.chart,
                hasGraph: true
            }
        ];

        let chartInstance = null;

        // Render functions
        function renderApp() {
            const container = document.getElementById('questions-container');
            
            questions.forEach(q => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-md overflow-hidden transition-all duration-300 border border-slate-200';
                
                const graphHtml = q.hasGraph ? `
                    <div class="mt-8 bg-white p-4 rounded-xl border border-slate-200 shadow-sm" dir="ltr">
                        <h5 class="text-center font-bold text-gray-700 mb-4 font-sans" dir="rtl">
                            גרף: השפעת ריכוז המצע על קצב התגובה האנזימטית
                        </h5>
                        <div class="w-full relative" style="height: 300px;">
                            <canvas id="kineticsChart"></canvas>
                        </div>
                    </div>
                ` : '';

                card.innerHTML = `
                    <div class="p-6">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="bg-blue-50 p-2 rounded-lg">${q.icon}</div>
                            <h2 class="text-sm font-semibold text-blue-600 tracking-wide">${q.unit}</h2>
                        </div>
                        
                        <div class="bg-slate-50 p-4 rounded-lg mb-6 text-gray-700 text-sm leading-relaxed border-r-4 border-blue-300">
                            <span class="font-semibold block mb-1">רקע:</span>
                            <span>${q.context}</span>
                        </div>

                        <h3 class="text-lg font-bold text-gray-800 mb-6">${q.question}</h3>

                        <button onclick="toggleAnswer('${q.id}')" id="btn-${q.id}" class="flex items-center gap-2 text-white bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                            <span id="icon-${q.id}">${icons.chevronDown}</span>
                            <span id="text-${q.id}">הצג תשובה והסבר</span>
                        </button>

                        <div id="answer-${q.id}" class="hidden mt-6 pt-6 border-t border-slate-200">
                            <h4 class="font-bold text-emerald-700 mb-2 flex items-center gap-2">
                                <span class="w-2 h-2 bg-emerald-500 rounded-full inline-block"></span>
                                תשובה מוצעת:
                            </h4>
                            <div class="text-gray-700 leading-relaxed space-y-2">
                                <p>${q.answer}</p>
                            </div>
                            ${graphHtml}
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // Toggle answers
        window.toggleAnswer = function(id) {
            const answerDiv = document.getElementById(`answer-${id}`);
            const btnIcon = document.getElementById(`icon-${id}`);
            const btnText = document.getElementById(`text-${id}`);
            const isHidden = answerDiv.classList.contains('hidden');

            if (isHidden) {
                answerDiv.classList.remove('hidden');
                answerDiv.classList.add('block', 'fade-in-down');
                btnText.innerText = 'הסתר תשובה';
                btnIcon.innerHTML = icons.chevronUp;

                // Initialize chart if opening question 4
                if (id === 'q4') {
                    setTimeout(initChart, 100);
                }
            } else {
                answerDiv.classList.add('hidden');
                answerDiv.classList.remove('block', 'fade-in-down');
                btnText.innerText = 'הצג תשובה והסבר';
                btnIcon.innerHTML = icons.chevronDown;
            }
        };

        // Initialize Chart.js
        function initChart() {
            const canvas = document.getElementById('kineticsChart');
            if (!canvas) return;

            if (chartInstance) {
                chartInstance.destroy();
            }

            const ctx = canvas.getContext('2d');
            
            // Register annotation plugin manually as we are using CDN
            Chart.register(window['chartjs-plugin-annotation']);

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [0, 0.25, 0.50, 1.00, 2.00, 4.00],
                    datasets: [{
                        label: 'קצב תגובה (µM/min)',
                        data: [0, 12.5, 21.6, 33.7, 41.0, 42.7],
                        borderColor: '#2563eb',
                        backgroundColor: '#2563eb',
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#2563eb',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 8,
                        tension: 0.3 // Smooth curve
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: (items) => `ריכוז: ${items[0].label} mM`,
                                label: (item) => `קצב: ${item.raw} µM/min`
                            },
                            titleFont: { family: 'Rubik' },
                            bodyFont: { family: 'Rubik' }
                        },
                        annotation: {
                            annotations: {
                                vmaxLine: {
                                    type: 'line',
                                    yMin: 43,
                                    yMax: 43,
                                    borderColor: '#ef4444',
                                    borderWidth: 2,
                                    borderDash: [5, 5],
                                    label: {
                                        content: 'Vmax ≈ 43',
                                        display: true,
                                        position: 'start',
                                        backgroundColor: 'rgba(239, 68, 68, 0.8)',
                                        font: { family: 'Rubik' }
                                    }
                                },
                                kmLine: {
                                    type: 'line',
                                    xMin: 0.5,
                                    xMax: 0.5,
                                    yMin: 0,
                                    yMax: 21.5,
                                    borderColor: '#10b981',
                                    borderWidth: 2,
                                    borderDash: [5, 5],
                                    label: {
                                        content: 'Km ≈ 0.5',
                                        display: true,
                                        position: 'end',
                                        backgroundColor: 'rgba(16, 185, 129, 0.8)',
                                        font: { family: 'Rubik' }
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: { display: true, text: 'ריכוז מצע (mM)', font: { family: 'Rubik', weight: 'bold' } },
                            grid: { color: '#e2e8f0', borderDash: [3, 3] }
                        },
                        y: {
                            title: { display: true, text: 'קצב תגובה (µM/min)', font: { family: 'Rubik', weight: 'bold' } },
                            min: 0,
                            max: 50,
                            grid: { color: '#e2e8f0', borderDash: [3, 3] }
                        }
                    }
                }
            });
        }

        // Run application
        document.addEventListener('DOMContentLoaded', renderApp);
    </script>
</body>
</html>
